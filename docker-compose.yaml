services:
  ubuntu-desktop:
    image: 'lscr.io/linuxserver/webtop:ubuntu-mate'
    container_name: ubuntu_gui
    security_opt:
      - 'seccomp:unconfined'
      - 'apparmor:unconfined'
    privileged: true
    ipc: host
    environment:
      PUID: '1000'
      PGID: '1000'
      TZ: Europe/Berlin
      SUBFOLDER: /
      WEBTOP_USER: abc
      PASSWORD: '${USER_PASSWORD}'
      KASMVNC_AUTO_SSL: '0'
      WEBTOP_RENDERER: wmp
      ENABLE_AUDIO: 'true' # Изменено на true для инициализации PulseAudio
    volumes:
      - './config:/config'
    # Пробрасываем видеокарту хоста для работы VAAPI:
    devices:
      - /dev/dri:/dev/dri
    shm_size: 1gb
    restart: unless-stopped