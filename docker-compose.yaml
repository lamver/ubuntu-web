services:
  ubuntu-desktop:
    image: lscr.io/linuxserver/webtop:ubuntu-xfce
    container_name: ubuntu_gui
    security_opt:
      - seccomp:unconfined
    privileged: true
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Berlin
      - SUBFOLDER=/
      - WEBTOP_USER=abc
      - PASSWORD=${USER_PASSWORD}
      # Эта строка отключает HTTPS и чинит ошибку "400 Bad Request":
      - KASMVNC_AUTO_SSL=0
      # Автоматическая смена паролей в системе при старте:
      #- S6_STAGE2_HOOK=echo "root:${ROOT_PASSWORD}" | chpasswd && echo "abc:${USER_PASSWORD}" | chpasswd
    volumes:
      - ./config:/config
    #ports:
      # Возвращаем стандартный HTTP порт контейнера (3000) на ваш порт (3005)
    #  - "127.0.0.1:3005:3000" 
    shm_size: "1gb"
    restart: unless-stopped